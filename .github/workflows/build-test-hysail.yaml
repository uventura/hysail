name: Build and Test HySAIL
run-name: ${{ github.actor }}

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: ${{ github.workspace }}

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y make

      - name: Create virtual environment
        run: |
          python -m venv hysail_env

      - name: Build project environment
        run: |
          chmod +x ./scripts/*.sh
          source hysail_env/bin/activate
          ./scripts/build.sh

      - name: Run test suite
        run: |
          source hysail_env/bin/activate
          make test

      - name: Run lorem example
        run: |
          source hysail_env/bin/activate
          make lorem_example
